    width: 148px; flex-shrink: 0; border-right: 1px solid var(--border);

<script>
function getCssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

const NAMES = {
  'LMT':   'Lockheed Martin',       'RTX':   'RTX Corporation',
  'NOC':   'Northrop Grumman',      'GD':    'General Dynamics',
  'HII':   'Huntington Ingalls',    'LHX':   'L3Harris Technologies',
  'BA':    'Boeing',                'BA.L':  'BAE Systems',
  'RR.L':  'Rolls-Royce',           'QQ.L':  'QinetiQ Group',
  'PLTR':  'Palantir Technologies', 'LDOS':  'Leidos Holdings',
  'CACI':  'CACI International',    'SAIC':  'Science Applications Intl',
  'BAH':   'Booz Allen Hamilton',   'AVAV':  'AeroVironment',
  'KTOS':  'Kratos Defense',        'RCAT':  'Red Cat Holdings',
  'TXT':   'Textron',               'SPCX':  'SpaceX',
  'RKLB':  'Rocket Lab',            'PL':    'Planet Labs',
  'ASTS':  'AST SpaceMobile',
  'TDG':   'TransDigm Group',       'HEI':   'HEICO Corporation',
  'AXON':  'Axon Enterprise',       'OLN':   'Olin Corporation',
  'MRCY':  'Mercury Systems',       'DRS':   'Leonardo DRS',
};

const CAT_LABELS = {
  'us-primes':   'US Prime Contractors',
  'uk-european': 'UK / European',
  'cyber-intel': 'Cyber / Intelligence',
  'drones':      'Drones / Autonomy',
  'space':       'Space Defence',
  'weapons':     'Weapons / Systems',
};

const CAT_ORDER = ['us-primes', 'uk-european', 'cyber-intel', 'drones', 'space', 'weapons'];

const METRICS_CFG = {
  '1d':  { field: 'change_1d',  label: '1D',  threshold: 5  },
  '1w':  { field: 'change_1w',  label: '1W',  threshold: 10 },
  '1m':  { field: 'change_1m',  label: '1M',  threshold: 20 },
  'ytd': { field: 'change_ytd', label: 'YTD', threshold: 40 },
  '1y':  { field: 'return_1yr', label: '1Y',  threshold: 60 },
};

function yahooUrl(t) { return 'https://finance.yahoo.com/quote/' + t + '/'; }

function parsePct(s) {
  if (s == null || s === '' || s === '—' || s === 'N/A') return null;
  const n = parseFloat(String(s).replace(/[%,\s]/g, ''));
  return isNaN(n) ? null : n;
}

function getVal(stock, metricId) {
  const cfg = METRICS_CFG[metricId];
  if (!cfg) return null;
  return parsePct(stock[cfg.field]);
}

function fmtPct(val) {
  if (val === null) return '—';
  return (val >= 0 ? '+' : '') + val.toFixed(2) + '%';
}

function valCls(val) {
  if (val === null) return 'neu';
  return val > 0.049 ? 'pos' : val < -0.049 ? 'neg' : 'neu';
}

function tileSize(stock, metricId) {
  const v = getVal(stock, metricId);
  return v === null ? 0.05 : Math.max(0.05, Math.abs(v));
}

/* Color: flat green (gainers) or flat red (losers) */
function tileColor(val, threshold) {
  if (val === null) return getCssVar('--surface');
  if (val > 0) return getCssVar('--green');
  if (val < 0) return getCssVar('--red');
  return getCssVar('--surface2');
}

let activeMetric = localStorage.getItem('heatmap-metric') || '1d';
let allStocks    = [];

function drawTreemap(containerEl, stocks, metricId, height, explicitWidth) {
  containerEl.innerHTML = '';
  if (!stocks.length) return;

  const cfg = METRICS_CFG[metricId];
  const W = explicitWidth || containerEl.clientWidth || 1200;
  const H = height;

  const root = d3.hierarchy({ children: stocks.map(s => ({ ...s })) })
    .sum(d => tileSize(d, metricId))
    .sort((a, b) => b.value - a.value);

  d3.treemap().size([W, H]).paddingInner(1).paddingOuter(0).round(true)(root);

  const leaves = root.leaves();

  const svg = d3.select(containerEl).append('svg').attr('width', W).attr('height', H);

  const tileG = svg.selectAll('.tile')
    .data(leaves)
    .enter()
    .append('g')
    .attr('class', 'tile')
    .attr('transform', d => `translate(${d.x0},${d.y0})`)
    .style('cursor', 'pointer')
    .on('click',      (ev, d) => window.open(yahooUrl(d.data.ticker), '_blank', 'noopener'))
    .on('mousemove',  (ev, d) => showTooltip(ev, d.data))
    .on('mouseleave', hideTooltip);

  tileG.append('clipPath')
    .attr('id', (d, i) => `c${containerEl.id}-${i}`)
    .append('rect')
    .attr('width',  d => Math.max(0, d.x1 - d.x0 - 2))
    .attr('height', d => Math.max(0, d.y1 - d.y0 - 2))
    .attr('x', 1).attr('y', 1);

  tileG.append('rect')
    .attr('width',  d => Math.max(0, d.x1 - d.x0))
    .attr('height', d => Math.max(0, d.y1 - d.y0))
    .attr('fill',   d => tileColor(getVal(d.data, metricId), cfg.threshold))
    .attr('stroke', getCssVar('--bg'))
    .attr('stroke-width', 0.5)
    .on('mouseover', function() { d3.select(this).attr('filter', 'brightness(1.3)'); })
    .on('mouseout',  function() { d3.select(this).attr('filter', null); });

  const CW = 0.62;
  leaves.forEach(d => {
    const w = d.x1 - d.x0, h = d.y1 - d.y0;
    const vs = fmtPct(getVal(d.data, metricId));
    const tRaw = Math.min((w * 0.60) / (d.data.ticker.length * CW), h * 0.30, 30);
    const vRaw = Math.min((w * 0.60) / (vs.length * CW),            h * 0.22, 18);
    d._tfs = (tRaw >= 8  && w >= 26 && h >= 18) ? tRaw : 0;
    d._vfs = (d._tfs > 0 && vRaw >= 7 && h >= 32) ? vRaw : 0;
    d._vs  = vs;
    d._ty  = (d._tfs > 0 && d._vfs > 0) ? h * 0.37 : h * 0.50;
    d._vy  = h * 0.64;
  });

  tileG.append('text')
    .attr('clip-path', (d, i) => `url(#c${containerEl.id}-${i})`)
    .attr('x', d => (d.x1-d.x0)/2).attr('y', d => d._ty)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
    .attr('font-family', 'IBM Plex Sans, sans-serif').attr('font-weight', '400')
    .attr('font-size', d => d._tfs || 0)
    .attr('fill', d => d._tfs ? '#ffffff' : 'transparent')
    .text(d => d.data.ticker);

  tileG.append('text')
    .attr('clip-path', (d, i) => `url(#c${containerEl.id}-${i})`)
    .attr('x', d => (d.x1-d.x0)/2).attr('y', d => d._vy)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
    .attr('font-family', 'IBM Plex Sans, sans-serif')
    .attr('font-size', d => d._vfs || 0)
    .attr('fill', d => d._vfs ? '#ffffff' : 'transparent')
    .text(d => d._vfs ? d._vs : '');
}

/* ── Split helper: gainers left, losers right ── */
function drawSplit(el, stocks, metricId, H) {
  el.innerHTML = '';
  const gainers = stocks.filter(s => (getVal(s, metricId) ?? 0) >= 0);
  const losers  = stocks.filter(s => (getVal(s, metricId) ?? 0) <  0);
  const total   = gainers.length + losers.length || 1;
  const W       = el.clientWidth || 1200;
  const gW      = gainers.length ? Math.round(W * gainers.length / total) : 0;
  const lW      = losers.length  ? W - gW : 0;
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:3px;height:' + H + 'px;';
  el.appendChild(wrap);
  if (gW > 0) {
    const gDiv = document.createElement('div');
    gDiv.id = (el.id || 'sp') + '-g';
    gDiv.style.cssText = 'width:' + gW + 'px;flex-shrink:0;';
    wrap.appendChild(gDiv);
    drawTreemap(gDiv, gainers, metricId, H, gW);
  }
  if (lW > 0) {
    const lDiv = document.createElement('div');
    lDiv.id = (el.id || 'sp') + '-l';
    lDiv.style.cssText = 'width:' + lW + 'px;flex-shrink:0;';
    wrap.appendChild(lDiv);
    drawTreemap(lDiv, losers, metricId, H, lW);
  }
}

function renderAll(stocks, metricId) {
  const el = document.getElementById('map-all');
  const H  = Math.max(480, Math.min(660, Math.round(window.innerHeight * 0.58)));
  el.style.height = H + 'px';
  drawSplit(el, stocks, metricId, H);
}

function renderSectors(stocks, metricId) {
  const container = document.getElementById('sectors-container');
  container.innerHTML = '';

  const groups = {};
  stocks.forEach(s => {
    const cat = s.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(s);
  });

  const orderedSlugs = [
    ...CAT_ORDER.filter(c => groups[c]),
    ...Object.keys(groups).filter(c => !CAT_ORDER.includes(c))
  ];

  orderedSlugs.forEach(slug => {
    const ss = groups[slug];
    const name = CAT_LABELS[slug] || slug;
    const H = Math.max(180, Math.min(340, ss.length * 52));

    const block = document.createElement('div');
    block.className = 'sector-block';

    const label = document.createElement('div');
    label.className = 'sector-name';
    label.innerHTML = name.toUpperCase() + ' <span class="sc">· ' + ss.length + ' stock' + (ss.length !== 1 ? 's' : '') + '</span>';

    const mapEl = document.createElement('div');
    mapEl.className = 'map-wrap';
    mapEl.id = 'sec-' + slug;
    mapEl.style.height = H + 'px';

    block.appendChild(label);
    block.appendChild(mapEl);
    container.appendChild(block);

    drawSplit(mapEl, ss, metricId, H);
  });
}

function renderAll2(metricId) {
  renderAll(allStocks, metricId);
  renderSectors(allStocks, metricId);
  updateLegend(metricId);
}

function updateLegend(metricId) {
  const cfg = METRICS_CFG[metricId];
  document.getElementById('leg-neg').textContent  = '−' + cfg.threshold + '%';
  document.getElementById('leg-pos').textContent  = '+' + cfg.threshold + '%';
  document.getElementById('size-label').textContent = '|' + cfg.label + ' %|';
}

const ttEl = document.getElementById('tooltip');

function showTooltip(event, stock) {
  const rows = Object.entries(METRICS_CFG).map(([id, cfg]) => {
    const val = getVal(stock, id);
    return `<div class="tt-key">${cfg.label} %</div><div class="tt-val ${valCls(val)}">${fmtPct(val)}</div>`;
  }).join('');

  const price = parseFloat(stock.price_usd);
  const priceStr = !price || price <= 0 ? '—'
    : price >= 100 ? '$' + price.toFixed(0)
    : price >= 10  ? '$' + price.toFixed(2)
    : price >= 1   ? '$' + price.toFixed(3)
    : '$' + price.toFixed(4);

  const mcap = parseFloat(stock.market_cap_usd_b);
  const mcapStr = (!mcap || mcap <= 0) ? ''
    : `<div class="tt-divider"></div><div class="tt-key">Mkt Cap</div><div class="tt-val neu">$${mcap.toFixed(1)}B</div>`;

  ttEl.innerHTML =
    `<div class="tt-ticker">${stock.ticker}</div>` +
    `<div class="tt-company">${stock.company_name || NAMES[stock.ticker] || stock.ticker}</div>` +
    `<div class="tt-grid">${rows}${mcapStr}</div>` +
    `<div class="tt-price">${priceStr}</div>`;

  ttEl.classList.remove('hidden');
  positionTooltip(event);
}

function positionTooltip(ev) {
  const pad = 14, tw = ttEl.offsetWidth, th = ttEl.offsetHeight;
  let x = ev.clientX + pad, y = ev.clientY - th / 2;
  if (x + tw > window.innerWidth  - 8) x = ev.clientX - tw - pad;
  if (y < 8) y = 8;
  if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
  ttEl.style.left = x + 'px';
  ttEl.style.top  = y + 'px';
}

function hideTooltip() { ttEl.classList.add('hidden'); }
document.addEventListener('mousemove', ev => {
  if (!ttEl.classList.contains('hidden')) positionTooltip(ev);
});

document.getElementById('metric-group').addEventListener('click', ev => {
  const btn = ev.target.closest('.metric-btn');
  if (!btn) return;
  const m = btn.dataset.metric;
  if (m === activeMetric) return;
  activeMetric = m;
  localStorage.setItem('heatmap-metric', m);
  document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll2(m);
});

function init() {
  const stocks = window.PRICES_DATA && window.PRICES_DATA.stocks;
  if (!stocks || !stocks.length) {
    document.getElementById('map-all').innerHTML =
      '<div class="empty-state">No data — prices-data.js not loaded or empty.</div>';
    return;
  }
  allStocks = stocks;
  const tsEl = document.getElementById('heatmap-ts');
  if (tsEl) tsEl.textContent = window.PRICES_DATA.updated || '—';
  const catCount = new Set(stocks.map(s => s.category)).size;
  const scEl = document.getElementById('hm-stock-count');
  const allEl = document.getElementById('hm-all-count');
  const catEl = document.getElementById('hm-cat-count');
  if (scEl)  scEl.textContent  = stocks.length;
  if (allEl) allEl.textContent = stocks.length + ' stocks';
  if (catEl) catEl.textContent = catCount + ' categories';
  document.querySelectorAll('.metric-btn').forEach(b => b.classList.toggle('active', b.dataset.metric === activeMetric));
  renderAll2(activeMetric);

  let t;
  window.addEventListener('resize', () => {
    clearTimeout(t);
    t = setTimeout(() => renderAll2(activeMetric), 280);
  });
}

init();
window._onThemeChange = () => renderAll2(activeMetric);
function openDrawer()  { document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }
</script>
