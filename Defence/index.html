<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;family=IBM+Plex+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>

<style>
  /* Filter tabs */
  .filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 10px 14px; border-top: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .search-count-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; flex-shrink: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .search-count-bar input {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 6px 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); outline: none; flex: 1; max-width: 360px;
  }
  .search-count-bar input:focus { border-color: var(--accent); }
  .search-count-bar .row-count {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--dim); white-space: nowrap; margin-left: auto;
  }

  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    position: relative;
  }

  .filter-btn:hover { color: var(--accent); border-color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

  /* Filter button tooltips */
  .filter-btn[data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    line-height: 1.5;
    width: 220px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    text-transform: none;
    letter-spacing: 0;
  }
  .filter-btn[data-tooltip]::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--accent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 1001;
  }
  .filter-btn:hover[data-tooltip]::after,
  .filter-btn:hover[data-tooltip]::before { opacity: 1; }

  .filter-btn[data-filter="us-primes"].active  { background: var(--amber);  border-color: var(--amber);  color: var(--bg); }
  .filter-btn[data-filter="uk-european"].active { background: var(--gold);   border-color: var(--gold);   color: var(--bg); }
  .filter-btn[data-filter="cyber-intel"].active { background: var(--purple); border-color: var(--purple); color: var(--text); }
  .filter-btn[data-filter="drones"].active      { background: var(--teal);   border-color: var(--teal);   color: var(--bg); }
  .filter-btn[data-filter="space"].active       { background: var(--blue);   border-color: var(--blue);   color: var(--text); }
  .filter-btn[data-filter="weapons"].active     { background: var(--rose);   border-color: var(--rose);   color: var(--bg); }

  /* Section headers */
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 36px 0 16px;
  }

  .section-title {
    font-size: 14px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    margin-bottom: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    white-space: nowrap;
  }

  thead th.sortable {
    cursor: pointer;
    user-select: none;
  }

  thead th.sortable:hover { color: var(--accent); }

  thead th.sort-asc::after  { content: ' ▲'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ▼'; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(30,45,61,0.5);
    transition: background 0.15s;
    cursor: default;
  }

  tbody tr:hover { background: var(--surface2); }

  tbody tr.hidden { display: none; }

  td {
    padding: 14px 16px;
    vertical-align: middle;
    white-space: nowrap;
  }

  /* Ticker */
  .ticker-link { text-decoration: none; color: inherit; }
  .ticker-link:hover .ticker { text-decoration: underline; opacity: 0.85; }

  .ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
  }

  .exchange-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* Category badge */
  .cat-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .cat-us-primes   { background: rgba(245,158,11,0.15);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.3); }
  .cat-uk-european { background: rgba(255,215,0,0.1);    color: var(--gold);   border: 1px solid rgba(255,215,0,0.3); }
  .cat-cyber-intel { background: rgba(192,132,252,0.15); color: var(--purple); border: 1px solid rgba(192,132,252,0.3); }
  .cat-drones      { background: rgba(45,212,191,0.1);   color: var(--teal);   border: 1px solid rgba(45,212,191,0.25); }
  .cat-space       { background: rgba(68,136,255,0.1);   color: var(--blue);   border: 1px solid rgba(68,136,255,0.25); }
  .cat-weapons     { background: rgba(251,113,133,0.1);  color: var(--rose);   border: 1px solid rgba(251,113,133,0.25); }

  /* Price */
  .price {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  /* Change pills (1D / 1W / 1M under price) */


  /* Return */
  .return-positive { color: #16a34a; font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  .return-mega     { color: #0284c7; font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  html[data-theme="dark"] .return-mega { color: #ffd700; }
  .return-modest   { color: #0284c7; font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  .return-negative { color: #dc2626; font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  tr[data-return^="-"] .return-modest,
  tr[data-return^="-"] .return-positive { color: #dc2626; }

  /* 52w range bar */
  .range-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 160px;
  }

  .range-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 36px;
  }

  .range-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
    min-width: 80px;
  }

  .range-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .range-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--accent);
  }

  /* YTD return column */
  .ytd-return { font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  .ytd-pos  { color: var(--green); }
  .ytd-neg  { color: var(--red); }
  .ytd-flat { color: var(--muted); }

  /* Notes col */
  /* Footer */
  footer {
    margin-top: 48px;
    padding: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  footer strong { color: var(--accent2); }

  /* Animate rows in */
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  tbody tr { animation: rowIn 0.3s ease both; }
  tbody tr:nth-child(1) { animation-delay: 0.05s; }
  tbody tr:nth-child(2) { animation-delay: 0.08s; }
  tbody tr:nth-child(3) { animation-delay: 0.11s; }
  tbody tr:nth-child(4) { animation-delay: 0.14s; }
  tbody tr:nth-child(5) { animation-delay: 0.17s; }
  tbody tr:nth-child(6) { animation-delay: 0.20s; }
  tbody tr:nth-child(7) { animation-delay: 0.23s; }
  tbody tr:nth-child(8) { animation-delay: 0.26s; }
  tbody tr:nth-child(9) { animation-delay: 0.29s; }
  tbody tr:nth-child(10) { animation-delay: 0.32s; }
  tbody tr:nth-child(n+11) { animation-delay: 0.35s; }

  /* Search + count bar */
  #stock-search {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    width: 240px;
    outline: none;
    letter-spacing: 0.5px;
  }
  #stock-search:focus { border-color: var(--accent); }
  #stock-search::placeholder { color: var(--muted); }

  /* Count display */
  .row-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    padding-left: 2px;
  }

  .row-count span { color: var(--accent); font-weight: 700; }

  @media (max-width: 768px) {
    .container { padding: 16px 12px; }
    .nav-inner { padding: 8px 12px; flex-wrap: wrap; }
    header { padding: 20px 0 16px; }
    .header-inner { padding-left: 27px; }
    .header-inner::before { left: 12px; }
    h1 { font-size: 26px; }

    .filter-btn { font-size: 10px; padding: 6px 10px; letter-spacing: 0; }

    table { font-size: 12px; }
    thead th { padding: 10px 8px; font-size: 10px; }
    td { padding: 10px 8px; }
    .ticker { font-size: 13px; }
    .price { font-size: 14px; }
    .exchange-badge { font-size: 9px; }

    table th:nth-child(6), table td:nth-child(6) { display: none; }
    table th:nth-child(7), table td:nth-child(7) { display: none; }
    table th:nth-child(8), table td:nth-child(8) { display: none; }

    .row-count { font-size: 11px; }

    footer { font-size: 10px; padding: 16px; }
  }

  /* ─── 3-Panel Layout ─── */
  body[data-layout="rail"] { flex-direction: row; }
  .right-side { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .nav-panel {
    width: 148px; flex-shrink: 0; border-right: 1px solid var(--border);
    background: var(--bg); display: flex; flex-direction: column;
    padding: 8px 0; overflow-y: auto; scrollbar-width: none;
  }
  .nav-panel::-webkit-scrollbar { display: none; }
  .nav-item { display: flex; flex-direction: column; }
  .nav-panel .nav-link {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; padding: 10px 14px; color: var(--dim);
    border: none; border-left: 2px solid transparent; text-decoration: none;
    display: flex; align-items: center; gap: 8px; transition: all 0.15s;
    cursor: pointer; background: none; width: 100%; text-align: left;
  }
  .nav-panel .nav-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
  .nav-panel .nav-link:hover  { color: var(--accent); background: var(--surface2); }
  .nav-icon  { font-size: 14px; flex-shrink: 0; }
  .nav-label { flex: 1; white-space: nowrap; }
  .nav-arrow { font-size: 8px; color: var(--muted); margin-left: auto; transition: transform 0.2s; }
  .nav-item.open .nav-arrow { transform: rotate(90deg); }
  .nav-sub {
    display: none; flex-direction: column; background: var(--surface2);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .nav-item.open .nav-sub { display: flex; }
  .sub-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); padding: 6px 14px 2px 26px;
  }
  .sub-link {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 7px 14px 7px 26px; color: var(--dim);
    border-left: 2px solid transparent; text-decoration: none; display: flex;
    align-items: center; gap: 6px; transition: all 0.15s; cursor: pointer; white-space: nowrap;
  }
  .sub-link:hover  { color: var(--accent); }
  .sub-link.active { color: var(--accent); border-left-color: var(--accent); font-weight: 700; }
  .sub-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; opacity: 0.5; }
  .sub-link.active .sub-dot { opacity: 1; }
  .chip {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; padding: 5px 12px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap;
    flex-shrink: 0; transition: all 0.15s;
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
  .hamburger {
    display: none; width: 44px; height: 44px; background: transparent; cursor: pointer; font-size: 18px;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .drawer-overlay {
    display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.4);
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 164px; background: var(--bg); border-right: 1px solid var(--accent);
    display: flex; overflow: hidden;
  }
  .drawer .left-rail { border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .drawer .nav-panel  { flex: 1; overflow-y: auto; }
  @media (max-width: 900px) {
    .nav-panel { width: 52px; }
    .nav-label, .nav-arrow, .sub-label, .nav-sub { display: none !important; }
    .nav-panel .nav-link { padding: 12px 0; justify-content: center; border-left: none; }
    .nav-icon { font-size: 18px; }
    .header-blocks { display: none; }
    #stock-search { width: 160px; }
  }
  @media (max-width: 600px) {
    body[data-layout="rail"] .left-rail { display: none; }
    .nav-panel { display: none !important; }
    .hamburger { display: flex; }
    .header-blocks { display: none; }
    .header-inner { padding: 10px 14px !important; gap: 12px; }
    .header-left { padding: 8px 14px; }
    h1 { font-size: 20px; }
    .header-label { font-size: 9px; }
    .header-sub { font-size: 9px; }
    .container { padding: 12px 14px; }
  }

</style>
</head>

<script>
const NOTES = {
  'LMT':  'F-35 programme, classified US government contracts, space systems.',
  'RTX':  'Missiles, radar, jet engines (Pratt & Whitney). Patriot air defence beneficiary.',
  'NOC':  'B-21 Raider stealth bomber, space systems, electronic warfare.',
  'GD':   'Gulfstream jets, submarines, combat vehicles, IT services.',
  'HII':  "US Navy's only nuclear-powered aircraft carrier builder.",
  'LHX':  'Communications, electronic warfare, sensor systems.',
  'BA':   'F-15/F-18 jets, KC-46 tanker, Space Launch System. Turnaround story.',
  'BA.L': "Europe's largest defence company. Ships, aircraft, cyber. NATO spending tailwind.",
  'RR.L': 'Defence jet engines (Typhoon, F-35B), SMR developer, naval propulsion.',
  'QQ.L': 'UK/US defence R&D, test & evaluation, autonomous systems.',
  'PLTR': 'AI-powered data analytics for US/UK military and intelligence agencies.',
  'LDOS': 'US federal IT, cybersecurity, health IT. Large Pentagon contract base.',
  'CACI': 'Intelligence community IT, cyber, enterprise IT for US DoD.',
  'SAIC': 'Defence IT and engineering services, C4ISR systems integration.',
  'BAH':  'Government consulting, cyber, AI for US national security agencies.',
  'AVAV': 'Switchblade loitering munitions, Puma & Raven tactical UAS. Ukraine demand.',
  'KTOS': 'Affordable unmanned combat aerial vehicles (UCAV), hypersonic targets.',
  'RCAT': 'Small attack drones (Black Widow), counter-drone systems for US Army.',
  'TXT':  'Bell helicopters, Cessna aircraft, armed drones, combat vehicles.',
  'SPCX': 'Largest IPO in history. Falcon 9 + Starship launch vehicles, Starlink satellite internet, Dragon spacecraft. Founded 2002 by Elon Musk.',
  'RKLB': 'Electron small-sat launcher, Neutron medium-lift, space systems for DoD/NRO.',
  'PL':   'Daily earth imagery constellation. Intelligence and defence earth observation contracts.',
  'ASTS': 'Space-based broadband direct-to-device. US government communications contracts.',
  'TDG':  'Proprietary aerospace components. Near-monopoly aftermarket pricing power.',
  'HEI':  'FAA-approved aerospace parts. Military/commercial MRO compound compounder.',
  'AXON': 'Tasers, bodycams, AI-powered public safety platform. Growing military/border use.',
  'OLN':  'Winchester Ammunition — small-calibre military and commercial rounds supplier.',
  'MRCY': 'Mission-critical processing for radar, EW, sensor fusion in US military platforms.',
  'DRS':  'US Army ground vehicle electronics, thermal imaging, naval power systems.',
};

const CAT_COLORS = {
  'us-primes':   'var(--amber)',
  'uk-european': 'var(--gold)',
  'cyber-intel': 'var(--purple)',
  'drones':      'var(--teal)',
  'space':       'var(--blue)',
  'weapons':     'var(--rose)',
};

const CAT_LABELS = {
  'us-primes':   'US Primes',
  'uk-european': 'UK/European',
  'cyber-intel': 'Cyber / Intel',
  'drones':      'Drones',
  'space':       'Space',
  'weapons':     'Weapons / Systems',
};

function yahooUrl(t) { return 'https://finance.yahoo.com/quote/' + t + '/'; }

function returnClass(retStr) {
  const n = parseFloat(String(retStr).replace(/[^0-9.-]/g, ''));
  if (isNaN(n)) return 'return-modest';
  if (n >= 200) return 'return-mega';
  if (n >= 50)  return 'return-positive';
  return 'return-modest';
}

function pillClass(v) { const n = parseFloat(v); return n > 0 ? 'pos' : n < 0 ? 'neg' : 'flat'; }
function ytdClass(v)  { const n = parseFloat(v); return n > 0 ? 'ytd-pos' : n < 0 ? 'ytd-neg' : 'ytd-flat'; }

function buildTable(stocks) {
  const tbody = document.querySelector('#stock-table tbody');
  tbody.innerHTML = '';
  stocks.forEach(s => {
    const color    = CAT_COLORS[s.category] || 'var(--text)';
    const catLabel = CAT_LABELS[s.category] || s.category;
    const retCls   = returnClass(s.return_1yr);
    const exDisp   = s.exchange;
    const tr = document.createElement('tr');
    tr.dataset.ticker    = s.ticker;
    tr.dataset.cat       = s.category;
    tr.dataset.exchange  = s.exchange;
    tr.dataset.priceGbp  = s.price_gbp;
    tr.dataset.priceUsd  = s.price_usd;
    tr.dataset.return    = s.return_1yr;
    tr.dataset.changeYtd = s.change_ytd;
    tr.dataset.barPct    = s.bar_pct;
    tr.innerHTML =
      '<td><a class="ticker-link" href="' + yahooUrl(s.ticker) + '" target="_blank">' +
        '<div class="ticker" style="color:' + color + '">' + s.ticker + '</div></a>' +
        '<div class="exchange-badge">' + exDisp + '</div></td>' +
      '<td>' + (s.company_name || s.ticker) + '</td>' +
      '<td><span class="cat-badge cat-' + s.category + '">' + catLabel + '</span></td>' +
      '<td><span class="price">$' + fmtUsd(s.price_usd) + '</span>' +
        '<div class="change-pills">' +
          '<span class="cpill ' + pillClass(s.change_1d) + '">' + s.change_1d + ' 1D</span>' +
          '<span class="cpill ' + pillClass(s.change_1w) + '">' + s.change_1w + ' 1W</span>' +
          '<span class="cpill ' + pillClass(s.change_1m) + '">' + s.change_1m + ' 1M</span>' +
        '</div></td>' +
      '<td><span class="' + retCls + '">' + s.return_1yr + '</span></td>' +
      '<td><span class="ytd-return ' + ytdClass(s.change_ytd) + '">' + s.change_ytd + '</span></td>' +
      '<td><div class="range-wrap">' +
        '<span class="range-label">$' + fmtUsd(s.low_usd) + '</span>' +
        '<div class="range-bar-bg">' +
          '<div class="range-fill" style="width:' + s.bar_pct + '%"></div>' +
          '<div class="range-dot" style="left:' + s.bar_pct + '%"></div>' +
        '</div>' +
        '<span class="range-label" style="text-align:right">$' + fmtUsd(s.high_usd) + '</span>' +
      '</div></td>' +
      '<td><span class="notes-text">' + (NOTES[s.ticker] || '') + '</span></td>';
    tbody.appendChild(tr);
  });
  if (window.PRICES_DATA) {
    const tot = document.getElementById('total-count');
    if (tot) tot.textContent = stocks.length;
  }
}

let sortState = { col: null, dir: 1 };

window.addEventListener('DOMContentLoaded', () => {
  if (window.PRICES_DATA && window.PRICES_DATA.stocks) {
    buildTable(window.PRICES_DATA.stocks);
  }
  const returnTh = document.querySelector('th[onclick*="\'return\'"]');
  sortState.col = 'return';
  sortTable('return', returnTh);
  applyFilters();
});

function sortTable(col, th) {
  const tbody = document.querySelector('#stock-table tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  if (sortState.col === col) { sortState.dir *= -1; } else { sortState.col = col; sortState.dir = 1; }
  document.querySelectorAll('thead th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
  th.classList.add(sortState.dir === 1 ? 'sort-asc' : 'sort-desc');
  rows.sort((a, b) => {
    let av, bv;
    if (col === 'ticker')  { av = a.dataset.ticker;  bv = b.dataset.ticker; }
    if (col === 'company') { av = a.querySelector('td:nth-child(2)').textContent.trim(); bv = b.querySelector('td:nth-child(2)').textContent.trim(); }
    if (col === 'cat')     { av = a.dataset.cat;     bv = b.dataset.cat; }
    if (col === 'price')   { av = parseFloat(a.dataset.priceUsd); bv = parseFloat(b.dataset.priceUsd); return (av - bv) * sortState.dir; }
    if (col === 'return')  { av = parseFloat(a.dataset.return.replace(/[^0-9.-]/g,'')); bv = parseFloat(b.dataset.return.replace(/[^0-9.-]/g,'')); return (av - bv) * sortState.dir; }
    if (col === 'ytd')     { av = parseFloat(a.dataset.changeYtd); bv = parseFloat(b.dataset.changeYtd); return (av - bv) * sortState.dir; }
    if (col === 'range')   { av = parseFloat(a.dataset.barPct); bv = parseFloat(b.dataset.barPct); return (av - bv) * sortState.dir; }
    if (col === 'angle')   { av = a.querySelector('td:nth-child(8)').textContent.trim(); bv = b.querySelector('td:nth-child(8)').textContent.trim(); }
    return av.localeCompare(bv) * sortState.dir;
  });
  rows.forEach(r => tbody.appendChild(r));
}

let currentCat = 'all';

function applyFilters() {
  const query = document.getElementById('stock-search').value.toLowerCase().trim();
  const rows  = document.querySelectorAll('#stock-table tbody tr');
  let visible = 0;
  rows.forEach(row => {
    const matchCat    = currentCat === 'all' || row.dataset.cat === currentCat;
    const matchSearch = !query
      || row.dataset.ticker.toLowerCase().includes(query)
      || row.querySelector('td:nth-child(2)').textContent.toLowerCase().includes(query);
    if (matchCat && matchSearch) { row.classList.remove('hidden'); visible++; }
    else { row.classList.add('hidden'); }
  });
  document.getElementById('visible-count').textContent = visible;
}

function filterTable(cat, btn) {
  if (btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  currentCat = cat;
  applyFilters();
}

function filterNav(cat, el) {
  document.querySelectorAll('.sub-link').forEach(l => l.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === cat));
  currentCat = cat;
  applyFilters();
}

function filterChip(cat, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#ni-dashboard .sub-link, #ni-dashboard-d .sub-link').forEach(l => {
    const m = l.getAttribute('onclick') && l.getAttribute('onclick').match(/'([^',]+)'/);
    l.classList.toggle('active', !!(m && m[1] === cat));
  });
  currentCat = cat;
  applyFilters();
}

function toggleNav(id) {
  const item = document.getElementById('ni-' + id);
  if (!item) return;
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
}

function openDrawer()  { document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }

function searchTable() { applyFilters(); }
</script>
