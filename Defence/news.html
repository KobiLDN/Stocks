<head>

<style>
  .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .filter-btn:hover { color: var(--accent); border-color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
  .filter-btn[data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    line-height: 1.5;
    width: 220px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    text-transform: none;
    letter-spacing: 0;
  }
  .filter-btn[data-tooltip]::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--accent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 1001;
  }
  .filter-btn:hover[data-tooltip]::after,
  .filter-btn:hover[data-tooltip]::before { opacity: 1; }

  .toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
  #news-search {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    width: 260px;
    outline: none;
    letter-spacing: 0.5px;
  }
  #news-search:focus { border-color: var(--accent); }
  #news-search::placeholder { color: var(--muted); }
  .sort-group { display: flex; gap: 4px; }
  .sort-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); align-self: center; margin-right: 4px; }
  .sort-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { color: var(--accent); border-color: var(--accent); }
  .sort-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
  .row-count { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); margin-left: auto; }
  .row-count span { color: var(--accent); font-weight: 700; }

  .news-feed { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
  .news-card {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.15s, background 0.15s;
  }
  .news-card:hover { border-color: var(--accent); background: var(--surface2); }
  .sent-bar { width: 4px; flex-shrink: 0; }
  .sent-pos  { background: var(--green); }
  .sent-neg  { background: var(--red); }
  .sent-neu  { background: var(--muted); }
  .news-body { flex: 1; padding: 14px 18px; min-width: 0; }
  .news-meta-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .news-ticker { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; text-decoration: none; color: var(--text); }
  .news-ticker:hover { color: var(--accent); text-decoration: underline; }
  .news-company { color: var(--muted); font-size: 12px; }
  .cat-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 7px; letter-spacing: 0.5px; font-weight: 600; }
  .cat-us-primes   { background: rgba(245,158,11,0.15);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.35); }
  .cat-uk-european { background: rgba(255,215,0,0.1);    color: var(--gold);   border: 1px solid rgba(255,215,0,0.3); }
  .cat-cyber-intel { background: rgba(192,132,252,0.15); color: var(--purple); border: 1px solid rgba(192,132,252,0.3); }
  .cat-drones      { background: rgba(45,212,191,0.1);   color: var(--teal);   border: 1px solid rgba(45,212,191,0.3); }
  .cat-space       { background: rgba(68,136,255,0.1);   color: var(--blue);   border: 1px solid rgba(68,136,255,0.3); }
  .cat-weapons     { background: rgba(251,113,133,0.1);  color: var(--rose);   border: 1px solid rgba(251,113,133,0.3); }
  .news-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }
  .news-headline { display: block; font-size: 15px; font-weight: 600; line-height: 1.45; color: var(--text); text-decoration: none; margin-bottom: 8px; }
  .news-headline:hover { color: var(--accent); }
  .news-meta-bot { display: flex; align-items: center; gap: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .sent-pill { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; padding: 2px 7px; letter-spacing: 0.5px; }
  .sent-pill.sent-pos { background: rgba(0,230,118,0.12);  color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
  .sent-pill.sent-neg { background: rgba(255,68,68,0.12);  color: var(--red);   border: 1px solid rgba(255,68,68,0.3); }
  .sent-pill.sent-neu { background: rgba(90,122,154,0.12); color: var(--muted); border: 1px solid rgba(90,122,154,0.3); }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.7; border: 1px solid var(--border); }
  .empty-state strong { color: var(--accent); }

  footer { position: relative; z-index: 1; text-align: center; padding: 24px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; border-top: 1px solid var(--border); margin-top: 48px; }

  /* ─── 3-Panel Layout ─── */
  body[data-layout="rail"] { flex-direction: row; }
  .right-side { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .nav-panel {
    width: 148px; flex-shrink: 0; border-right: 1px solid var(--border);
    background: var(--bg); display: flex; flex-direction: column;
    padding: 8px 0; overflow-y: auto; scrollbar-width: none;
  }
  .nav-panel::-webkit-scrollbar { display: none; }
  .nav-item { display: flex; flex-direction: column; }
  .nav-panel .nav-link {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; padding: 10px 14px; color: var(--dim);
    border: none; border-left: 2px solid transparent; text-decoration: none;
    display: flex; align-items: center; gap: 8px; transition: all 0.15s;
    cursor: pointer; background: none; width: 100%; text-align: left;
  }
  .nav-panel .nav-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
  .nav-panel .nav-link:hover  { color: var(--accent); background: var(--surface2); }
  .nav-icon  { font-size: 14px; flex-shrink: 0; }
  .nav-label { flex: 1; white-space: nowrap; }
  .nav-arrow { font-size: 8px; color: var(--muted); margin-left: auto; transition: transform 0.2s; }
  .nav-item.open .nav-arrow { transform: rotate(90deg); }
  .nav-sub {
    display: none; flex-direction: column; background: var(--surface2);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .nav-item.open .nav-sub { display: flex; }
  .sub-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); padding: 6px 14px 2px 26px;
  }
  .sub-link {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 7px 14px 7px 26px; color: var(--dim);
    border-left: 2px solid transparent; text-decoration: none; display: flex;
    align-items: center; gap: 6px; transition: all 0.15s; cursor: pointer; white-space: nowrap;
  }
  .sub-link:hover  { color: var(--accent); }
  .sub-link.active { color: var(--accent); border-left-color: var(--accent); font-weight: 700; }
  .sub-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; opacity: 0.5; }
  .sub-link.active .sub-dot { opacity: 1; }
  .chip {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; padding: 5px 12px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap;
    flex-shrink: 0; transition: all 0.15s;
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

  .drawer-overlay {
    display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.4);
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 164px; background: var(--bg); border-right: 1px solid var(--accent);
    display: flex; overflow: hidden;
  }
  .drawer .left-rail { border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .drawer .nav-panel  { flex: 1; overflow-y: auto; }
  .search-count-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; flex-shrink: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .search-count-bar input {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 6px 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); outline: none; flex: 1; max-width: 360px;
  }
  .search-count-bar input:focus { border-color: var(--accent); }
  .search-count-bar .row-count {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--dim); white-space: nowrap; margin-left: auto;
  }
  @media (max-width: 900px) {
    .nav-panel { width: 52px; }
    .nav-label, .nav-arrow, .sub-label, .nav-sub { display: none !important; }
    .nav-panel .nav-link { padding: 12px 0; justify-content: center; border-left: none; }
    .nav-icon { font-size: 18px; }
    #news-search { width: 160px; }
  }
  @media (max-width: 600px) {
    body[data-layout="rail"] .left-rail { display: none; }
    .nav-panel { display: none !important; }

    #news-search, .search-count-bar .row-count { display: none; }
    .header-inner { padding: 10px 14px !important; gap: 12px; }
    .header-left { padding: 8px 14px; }
    h1 { font-size: 20px; }
    .header-label { font-size: 9px; }
    .header-sub { font-size: 9px; }
    .container { padding: 12px 14px; }
  }
</style>

<script>
  const NAMES = {
    'LMT':   'Lockheed Martin',       'RTX':   'RTX Corporation',
    'NOC':   'Northrop Grumman',      'GD':    'General Dynamics',
    'HII':   'Huntington Ingalls',    'LHX':   'L3Harris Technologies',
    'BA':    'Boeing',                'BA.L':  'BAE Systems',
    'RR.L':  'Rolls-Royce',           'QQ.L':  'QinetiQ Group',
    'PLTR':  'Palantir Technologies', 'LDOS':  'Leidos Holdings',
    'CACI':  'CACI International',    'SAIC':  'Science Applications Intl',
    'BAH':   'Booz Allen Hamilton',   'AVAV':  'AeroVironment',
    'KTOS':  'Kratos Defense',        'RCAT':  'Red Cat Holdings',
    'TXT':   'Textron',               'SPCX':  'SpaceX',
    'RKLB':  'Rocket Lab',            'PL':    'Planet Labs',
    'ASTS':  'AST SpaceMobile',
    'TDG':   'TransDigm Group',       'HEI':   'HEICO Corporation',
    'AXON':  'Axon Enterprise',       'OLN':   'Olin Corporation',
    'MRCY':  'Mercury Systems',       'DRS':   'Leonardo DRS',
  };

  const CAT_LABELS = {
    'us-primes':   'US Prime',
    'uk-european': 'UK/European',
    'cyber-intel': 'Cyber/Intel',
    'drones':      'Drones',
    'space':       'Space',
    'weapons':     'Weapons',
  };

  const CAT_TOOLTIPS = {
    'us-primes':   'Major US defence prime contractors — Lockheed, RTX, Northrop, General Dynamics, HII, L3Harris, Boeing',
    'uk-european': 'UK and European defence companies — BAE Systems, Rolls-Royce, QinetiQ',
    'cyber-intel': 'Cyber security and intelligence analytics — Palantir, Leidos, CACI, SAIC, Booz Allen Hamilton',
    'drones':      'Unmanned systems and autonomous platforms — AeroVironment, Kratos, Red Cat, Textron',
    'space':       'Space and satellite defence — Rocket Lab, Planet Labs, AST SpaceMobile',
    'weapons':     'Weapons systems and defence components — TransDigm, HEICO, Axon, Olin, Mercury Systems, Leonardo DRS',
  };

  function yahooUrl(ticker) {
    return 'https://finance.yahoo.com/quote/' + ticker + '/';
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function sentClass(v) {
    if (v === null || v === undefined) return 'sent-neu';
    if (v >= 0.05) return 'sent-pos';
    if (v <= -0.05) return 'sent-neg';
    return 'sent-neu';
  }

  function sentLabel(v) {
    if (v === null || v === undefined) return 'N/A';
    return (v >= 0 ? '+' : '') + v.toFixed(2);
  }

  function timeAgo(unixSec) {
    if (!unixSec) return '';
    const diff = Date.now() / 1000 - unixSec;
    if (diff < 0) return 'just now';
    if (diff < 3600) return Math.max(1, Math.round(diff / 60)) + 'm ago';
    if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
    if (diff < 86400 * 30) return Math.round(diff / 86400) + 'd ago';
    return new Date(unixSec * 1000).toLocaleDateString();
  }

  let sortMode = 'newest';
  let activeCategory = 'all';
  let searchQuery = '';
  let timeWindow = 'day';

  function setSort(mode, btn) {
    sortMode = mode;
    document.querySelectorAll('#sort-group .sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  }

  function setWindow(w, btn) {
    timeWindow = w;
    document.querySelectorAll('#window-group .sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  }

  function filterNews(q) {
    searchQuery = q.toLowerCase().trim();
    renderFeed();
  }

  function setCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    document.querySelectorAll('.sub-link').forEach(l => {
      const m = l.getAttribute('onclick') && l.getAttribute('onclick').match(/'([^']+)'/);
      l.classList.toggle('active', !!(m && m[1] === cat));
    });
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === cat));
    renderFeed();
  }
  function toggleNav(id) {
    const item = document.getElementById('ni-' + id);
    if (!item) return;
    const wasOpen = item.classList.contains('open');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('open'));
    if (!wasOpen) item.classList.add('open');
  }
  function openDrawer()  { document.getElementById('drawer-overlay').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }

  function renderFeed() {
    let items = window._newsItems || [];

    if (activeCategory !== 'all') {
      items = items.filter(n => n.category === activeCategory);
    }
    if (searchQuery) {
      items = items.filter(n =>
        n.ticker.toLowerCase().includes(searchQuery) ||
        n.name.toLowerCase().includes(searchQuery) ||
        (n.title || '').toLowerCase().includes(searchQuery)
      );
    }
    if (timeWindow !== 'all') {
      const span = timeWindow === 'day' ? 86400 : 604800;
      const cutoff = Date.now() / 1000 - span;
      items = items.filter(n => n.published && n.published >= cutoff);
    }

    const sorted = [...items].sort((a, b) => {
      switch (sortMode) {
        case 'oldest':   return (a.published || 0) - (b.published || 0);
        case 'positive': return (b.sentiment ?? -2) - (a.sentiment ?? -2);
        case 'negative': return (a.sentiment ??  2) - (b.sentiment ??  2);
        case 'newest':
        default:         return (b.published || 0) - (a.published || 0);
      }
    });

    document.getElementById('news-count').textContent = sorted.length;

    const feed = document.getElementById('news-feed');
    if (!sorted.length) {
      const anyNews = (window._newsItems || []).length > 0;
      feed.innerHTML = '<div class="empty-state">' +
        (anyNews
          ? 'No headlines match the current filters.'
          : 'No news data yet. The price/news bot needs to run on GitHub Actions to populate <strong>prices-data.js</strong>.') +
        '</div>';
      return;
    }

    feed.innerHTML = sorted.map(n => {
      const sc = sentClass(n.sentiment);
      const catLabel = CAT_LABELS[n.category] || n.category;
      const headlineTag = n.url
        ? '<a class="news-headline" href="' + escapeHtml(n.url) + '" target="_blank" rel="noopener">' + escapeHtml(n.title) + '</a>'
        : '<span class="news-headline">' + escapeHtml(n.title) + '</span>';
      return '<div class="news-card">' +
        '<div class="sent-bar ' + sc + '"></div>' +
        '<div class="news-body">' +
          '<div class="news-meta-top">' +
            '<a class="news-ticker" href="' + yahooUrl(n.ticker) + '" target="_blank" rel="noopener">' + n.ticker + '</a>' +
            '<span class="news-company">' + escapeHtml(n.name) + '</span>' +
            '<span class="cat-badge cat-' + n.category + '">' + catLabel + '</span>' +
            '<span class="news-time">' + timeAgo(n.published) + '</span>' +
          '</div>' +
          headlineTag +
          '<div class="news-meta-bot">' +
            '<span class="sent-pill ' + sc + '">' + sentLabel(n.sentiment) + '</span>' +
            (n.publisher ? '<span>' + escapeHtml(n.publisher) + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function buildFilterBar() {
    const cats = ['all', ...Object.keys(CAT_LABELS)];
    const bar = document.getElementById('filter-bar');
    if (!bar) return;
    bar.innerHTML = cats.map(cat => {
      const label = cat === 'all' ? 'All' : (CAT_LABELS[cat] || cat);
      const tip = CAT_TOOLTIPS[cat] ? ' data-tooltip="' + CAT_TOOLTIPS[cat] + '"' : '';
      return '<button class="filter-btn' + (cat === 'all' ? ' active' : '') + '" data-cat="' + cat + '"' + tip + ' onclick="setCategory(\'' + cat + '\')">' + label + '</button>';
    }).join('');
  }

  function buildNews(stocks) {
    const items = [];
    stocks.forEach(s => {
      const arr = Array.isArray(s.news) ? s.news : [];
      arr.forEach(n => {
        if (!n || !n.title) return;
        items.push({
          ticker:    s.ticker,
          name:      s.company_name || NAMES[s.ticker] || s.ticker,
          category:  s.category,
          title:     n.title,
          url:       n.url || null,
          publisher: n.publisher || null,
          published: (n.published !== undefined && n.published !== null) ? parseInt(n.published) : null,
          sentiment: (n.sentiment !== undefined && n.sentiment !== null) ? parseFloat(n.sentiment) : null,
        });
      });
    });
    window._newsItems = items;
    buildFilterBar();
    renderFeed();
  }

  if (window.PRICES_DATA) {
    buildNews(window.PRICES_DATA.stocks);
  } else {
    fetch('prices.json')
      .then(r => r.json())
      .then(data => buildNews(data.stocks))
      .catch(() => {
        document.getElementById('news-feed').innerHTML =
          '<div class="empty-state">No data available — run the price/news bot first.</div>';
      });
  }

</script>
