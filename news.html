<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Business news from FT, Reuters, BBC and The Guardian — aggregated and sentiment scored 3× daily.">
<title>News Feed</title>
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="AI/prices-data.js"></script>
<script src="shared.js" defer></script>
<style>
  /* Header control row (Row 3) — search + sort + period.
     Source filters (Row 2) use shared .filter-bar; .filter-btn is in shared.css. */
  .rss-controls {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
  }
  #news-search {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    width: 260px;
    outline: none;
    letter-spacing: 0.5px;
  }
  #news-search:focus { border-color: var(--accent); }
  #news-search::placeholder { color: var(--muted); }
  .sort-group { display: flex; gap: 4px; }
  .sort-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    align-self: center;
    margin-right: 4px;
  }
  .sort-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { color: var(--accent); border-color: var(--accent); }
  .sort-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
  .row-count { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); margin-left: auto; }
  .row-count span { color: var(--accent); font-weight: 700; }

  .news-feed {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 4px;
  }
  .news-card {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.15s, background 0.15s;
  }
  .news-card:hover { border-color: var(--accent); background: var(--surface2); }
  .sent-bar { width: 4px; flex-shrink: 0; }
  .sent-pos  { background: var(--green); }
  .sent-neg  { background: var(--red); }
  .sent-neu  { background: var(--muted); }
  .news-body { flex: 1; padding: 14px 18px; min-width: 0; }
  .news-meta-top {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .src-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .src-ft       { background: rgba(255,107,53,0.1);  color: var(--accent2); border: 1px solid rgba(255,107,53,0.25); }
  .src-reuters  { background: rgba(68,136,255,0.1);  color: var(--blue);    border: 1px solid rgba(68,136,255,0.25); }
  .src-bbc      { background: rgba(255,68,68,0.1);   color: var(--red);     border: 1px solid rgba(255,68,68,0.25); }
  .src-guardian { background: rgba(45,212,191,0.1);  color: var(--teal);    border: 1px solid rgba(45,212,191,0.25); }
  .news-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
  .news-headline {
    display: block;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.45;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 8px;
  }
  .news-headline:hover { color: var(--accent); }
  .news-summary {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .news-meta-bot {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .sent-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    letter-spacing: 0.5px;
  }
  .sent-pill.sent-pos { background: rgba(0,230,118,0.12);  color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
  .sent-pill.sent-neg { background: rgba(255,68,68,0.12);  color: var(--red);   border: 1px solid rgba(255,68,68,0.3); }
  .sent-pill.sent-neu { background: rgba(90,122,154,0.12); color: var(--muted); border: 1px solid rgba(90,122,154,0.3); }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    border: 1px solid var(--border);
  }
  .empty-state strong { color: var(--accent); }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 48px;
  }

  @media (max-width: 768px) {
    h1 { font-size: 26px; }
    #news-search { width: 100%; }
    .row-count { margin-left: 0; }
  }

  /* Mobile nav */
  .hamburger {
    display: none; width: 44px; height: 44px; border: 1px solid var(--border);
    background: none; cursor: pointer; font-size: 20px; flex-shrink: 0; color: var(--text);
  }
  .drawer-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.4); }
  .drawer-overlay.open { display: block; }
  .drawer { position: fixed; top: 36px; left: 0; bottom: 56px; width: 92px; background: var(--bg); border-right: 1px solid var(--accent); overflow-y: auto; z-index: 301; padding: 8px 6px; display: flex; flex-direction: column; gap: 4px; }
  .bottom-tabs { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 250; background: var(--bg); border-top: 1px solid var(--accent); padding-bottom: env(safe-area-inset-bottom); }
  .bottom-tabs-inner { display: flex; justify-content: space-around; align-items: stretch; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px 6px; background: none; border: none; cursor: pointer; border-top: 2px solid transparent; transition: all 0.15s; font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }
  .tab-btn.active { color: var(--accent); border-top-color: var(--accent); }
  .tab-icon { font-size: 16px; line-height: 1; }

  body[data-layout="rail"] { flex-direction: row; }
  .right-side { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  @media (max-width: 600px) {
    body { padding-bottom: 56px; }
    body[data-layout="rail"] .left-rail { display: none; }
    .hamburger { display: flex; }
    .bottom-tabs { display: block; }
  }
</style>
</head>
<body data-layout="rail">

<div id="ticker-tape"><div class="tape-track" id="tape-track"></div></div>
<div class="left-rail"></div>
<div class="right-side">
<header>
  <div class="header-inner">
  <button class="hamburger" id="hamburger" onclick="openDrawer()">☰</button>
  <div class="header-left">
    <div class="header-label">// Market Intelligence</div>
    <h1>News <span>Feed</span></h1>
    <div class="header-sub">FT · Reuters · BBC · Guardian · sentiment scored · Last updated <span id="data-bar-ts">—</span></div>
  </div>
  <button aria-label="Toggle theme" class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☾</button>
  </div>

  <div class="filter-bar" id="filter-bar"></div>

  <div class="rss-controls">
    <input type="text" id="news-search" placeholder="Search headline or source..." oninput="filterNews(this.value)">
    <span class="sort-label">Sort</span>
    <div class="sort-group" id="sort-group">
      <button class="sort-btn active" data-sort="newest" onclick="setSort('newest', this)">Newest</button>
      <button class="sort-btn" data-sort="oldest" onclick="setSort('oldest', this)">Oldest</button>
      <button class="sort-btn" data-sort="positive" onclick="setSort('positive', this)">Most Positive</button>
      <button class="sort-btn" data-sort="negative" onclick="setSort('negative', this)">Most Negative</button>
    </div>
    <span class="sort-label">Period</span>
    <div class="sort-group" id="window-group">
      <button class="sort-btn active" data-window="all" onclick="setWindow('all', this)">All Time</button>
      <button class="sort-btn" data-window="day" onclick="setWindow('day', this)">Last 24h</button>
      <button class="sort-btn" data-window="week" onclick="setWindow('week', this)">Last Week</button>
    </div>
    <span class="row-count">Showing <span id="news-count">—</span> articles</span>
  </div>
</header>

<div class="page-main">
<div class="container">

  <div class="news-feed" id="news-feed"></div>

</div><!-- /.container -->

<footer>
  FT · Reuters · BBC · Guardian · Sentiment: VADER · Last updated <span id="feed-updated">—</span>
</footer>
</div><!-- /.page-main -->
</div><!-- /.right-side -->

<script src="rss-data.js"></script>
<script>
  const SOURCE_LABELS = {
    ft:       'Financial Times',
    reuters:  'Reuters',
    bbc:      'BBC Business',
    guardian: 'Guardian Business',
  };

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function sentClass(v) {
    if (v === null || v === undefined) return 'sent-neu';
    if (v >= 0.05) return 'sent-pos';
    if (v <= -0.05) return 'sent-neg';
    return 'sent-neu';
  }

  function sentLabel(v) {
    if (v === null || v === undefined) return 'N/A';
    return (v >= 0 ? '+' : '') + v.toFixed(2);
  }

  function timeAgo(unixSec) {
    if (!unixSec) return '';
    const diff = Date.now() / 1000 - unixSec;
    if (diff < 0) return 'just now';
    if (diff < 3600) return Math.max(1, Math.round(diff / 60)) + 'm ago';
    if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
    if (diff < 86400 * 30) return Math.round(diff / 86400) + 'd ago';
    return new Date(unixSec * 1000).toLocaleDateString();
  }

  let sortMode    = 'newest';
  let activeSource = 'all';
  let searchQuery = '';
  let timeWindow  = 'all';

  function setSort(mode, btn) {
    sortMode = mode;
    document.querySelectorAll('#sort-group .sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  }

  function setWindow(w, btn) {
    timeWindow = w;
    document.querySelectorAll('#window-group .sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  }

  function filterNews(q) {
    searchQuery = q.toLowerCase().trim();
    renderFeed();
  }

  function setSource(src) {
    activeSource = src;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.src === src);
    });
    renderFeed();
  }

  function renderFeed() {
    let items = window._rssItems || [];

    if (activeSource !== 'all') {
      items = items.filter(n => n.source === activeSource);
    }
    if (searchQuery) {
      items = items.filter(n =>
        (n.title || '').toLowerCase().includes(searchQuery) ||
        (n.summary || '').toLowerCase().includes(searchQuery) ||
        (n.label || '').toLowerCase().includes(searchQuery)
      );
    }
    if (timeWindow !== 'all') {
      const span = timeWindow === 'day' ? 86400 : 604800;
      const cutoff = Date.now() / 1000 - span;
      items = items.filter(n => n.published && n.published >= cutoff);
    }

    const sorted = [...items].sort((a, b) => {
      switch (sortMode) {
        case 'oldest':   return (a.published || 0) - (b.published || 0);
        case 'positive': return (b.sentiment ?? -2) - (a.sentiment ?? -2);
        case 'negative': return (a.sentiment ??  2) - (b.sentiment ??  2);
        default:         return (b.published || 0) - (a.published || 0);
      }
    });

    document.getElementById('news-count').textContent = sorted.length;

    const feed = document.getElementById('news-feed');
    if (!sorted.length) {
      feed.innerHTML = '<div class="empty-state">' +
        ((window._rssItems || []).length > 0
          ? 'No articles match the current filters.'
          : 'No RSS data yet. Run <strong>News/generate_news_feed.py</strong> via GitHub Actions to populate <strong>rss-data.js</strong>.') +
        '</div>';
      return;
    }

    feed.innerHTML = sorted.map(n => {
      const sc = sentClass(n.sentiment);
      return '<div class="news-card">' +
        '<div class="sent-bar ' + sc + '"></div>' +
        '<div class="news-body">' +
          '<div class="news-meta-top">' +
            '<span class="src-badge src-' + n.source + '">' + escapeHtml(n.label) + '</span>' +
            '<span class="news-time">' + timeAgo(n.published) + '</span>' +
          '</div>' +
          '<a class="news-headline" href="' + escapeHtml(n.url) + '" target="_blank" rel="noopener">' + escapeHtml(n.title) + '</a>' +
          (n.summary ? '<div class="news-summary">' + escapeHtml(n.summary) + '</div>' : '') +
          '<div class="news-meta-bot">' +
            '<span class="sent-pill ' + sc + '">' + sentLabel(n.sentiment) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function buildFilterBar() {
    const sources = [
      { key: 'all',     label: 'All Sources' },
      { key: 'ft',      label: 'Financial Times' },
      { key: 'reuters', label: 'Reuters' },
      { key: 'bbc',     label: 'BBC Business' },
      { key: 'guardian',label: 'Guardian Business' },
    ];
    document.getElementById('filter-bar').innerHTML = sources.map(s =>
      '<button class="filter-btn' + (s.key === 'all' ? ' active' : '') + '" data-src="' + s.key + '" onclick="setSource(\'' + s.key + '\')">' + s.label + '</button>'
    ).join('');
  }

  function init(data) {
    window._rssItems = data.articles || [];
    if (data.generated_utc) {
      document.getElementById('feed-updated').textContent = data.generated_utc;
      const _dbTs = document.getElementById('data-bar-ts'); if (_dbTs) _dbTs.textContent = data.generated_utc;
      const d = new Date(data.generated_utc);
      const fmt = d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0');
      window.PRICES_DATA = { updated: fmt, stocks: (window.PRICES_DATA || {}).stocks || [] };
      if (typeof buildDataBar === 'function') buildDataBar();
    }
    buildFilterBar();
    renderFeed();
  }

  if (window.NEWS_FEED_DATA) {
    init(window.NEWS_FEED_DATA);
  } else {
    fetch('News/news-feed.json')
      .then(r => r.json())
      .then(data => init(data))
      .catch(() => {
        document.getElementById('news-feed').innerHTML =
          '<div class="empty-state">No data available — run <strong>News/generate_news_feed.py</strong> first.</div>';
      });
  }

</script>

<div class="drawer-overlay" id="drawer-overlay" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer left-rail"></div>
</div>
<div class="bottom-tabs"><div class="bottom-tabs-inner"></div></div>

<script>
function openDrawer()  { document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }
</script>
</body>
</html>
