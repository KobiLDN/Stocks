name: Update Prices

on:
  schedule:
    # Three times daily on weekdays (UTC)
    # 08:00 UTC — 1h after UK open (08:00 BST → 09:00 BST)
    # 14:30 UTC — 1h after US open (09:30 EDT → 15:30 BST)
    # 20:30 UTC — after US close  (16:30 EDT → 21:30 BST)
    - cron: '0 8 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch:
    inputs:
      sector:
        description: 'Sector to update prices for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - AI
          - Biotech
          - Defence
          - Tech
          - Crypto
          - Energy
          - MegaCap

permissions:
  contents: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Run price updaters
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINSTATS_API_KEY: ${{ secrets.COINSTATS_API_KEY }}
        run: |
          SECTOR="${{ inputs.sector }}"
          for s in AI Biotech Defence Tech Crypto Energy MegaCap; do
            if [[ "${{ github.event_name }}" == "schedule" || "$SECTOR" == "all" || "$SECTOR" == "$s" ]]; then
              pip install -q -r $s/requirements.txt
              (cd $s && python ${s}_update_prices.py)
            fi
          done

      - name: Run market updater (SPY/QQQ/VIX)
        if: github.event_name == 'schedule' || inputs.sector == 'all'
        run: |
          pip install -q yfinance
          python update_market.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SECTOR="${{ inputs.sector }}"
          LABEL="${SECTOR:-all sectors}"
          if git diff --quiet -- AI/index.html AI/prices.json AI/prices-data.js Biotech/index.html Biotech/prices.json Biotech/prices-data.js Defence/index.html Defence/prices.json Defence/prices-data.js Tech/prices.json Tech/prices-data.js Crypto/prices.json Crypto/prices-data.js Crypto/ytd_cache.json Energy/prices.json Energy/prices-data.js MegaCap/prices.json MegaCap/prices-data.js market.json market-data.js; then
            echo "No price changes."
          else
            git add AI/index.html AI/prices.json AI/prices-data.js
            git add Biotech/index.html Biotech/prices.json Biotech/prices-data.js
            git add Defence/index.html Defence/prices.json Defence/prices-data.js
            git add Tech/prices.json Tech/prices-data.js
            git add Crypto/prices.json Crypto/prices-data.js Crypto/ytd_cache.json
            git add Energy/prices.json Energy/prices-data.js
            git add MegaCap/prices.json MegaCap/prices-data.js
            git add market.json market-data.js
            git commit -m "Update prices — ${LABEL} ($(date -u '+%Y-%m-%d %H:%M UTC')) [skip ci]"
            for i in 1 2 3; do
              git fetch origin main
              git rebase origin/main
              git push origin HEAD:main && break
              echo "Push attempt $i failed, retrying..."
              sleep 10
            done
          fi
