name: Update Prices

on:
  schedule:
    # Twice daily on weekdays (UTC)
    # 13:00 UTC — pre-US-open snapshot (~09:00 ET / 14:00 BST)
    # 21:30 UTC — 30 min after US close (~17:30 ET / 22:30 BST)
    - cron: '0 13 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps (AI)
        working-directory: AI
        run: pip install -r requirements.txt

      - name: Run price updater (AI)
        working-directory: AI
        run: python update_prices.py

      - name: Install deps (Biotech)
        working-directory: Biotech
        run: pip install -r requirements.txt

      - name: Run price updater (Biotech)
        working-directory: Biotech
        run: python update_prices.py

      - name: Install deps (Defence)
        working-directory: Defence
        run: pip install -r requirements.txt

      - name: Run price updater (Defence)
        working-directory: Defence
        run: python update_prices.py

      - name: Install deps (Tech)
        working-directory: Tech
        run: pip install -r requirements.txt

      - name: Run price updater (Tech)
        working-directory: Tech
        run: python update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- AI/index.html AI/prices.json AI/prices-data.js Biotech/index.html Biotech/prices.json Biotech/prices-data.js Defence/index.html Defence/prices.json Defence/prices-data.js Tech/prices.json Tech/prices-data.js; then
            echo "No price changes."
          else
            git add AI/index.html AI/prices.json AI/prices-data.js
            git add Biotech/index.html Biotech/prices.json Biotech/prices-data.js
            git add Defence/index.html Defence/prices.json Defence/prices-data.js
            git add Tech/prices.json Tech/prices-data.js
            git commit -m "Update prices — all sectors ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase
            git push
          fi
