name: Update Prices

on:
  schedule:
    # Three times daily on weekdays (UTC)
    # 08:00 UTC — 1h after UK open (08:00 BST → 09:00 BST)
    # 14:30 UTC — 1h after US open (09:30 EDT → 15:30 BST)
    # 20:30 UTC — after US close  (16:30 EDT → 21:30 BST)
    - cron: '0 8 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch:
    inputs:
      sector:
        description: 'Sector to update prices for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - AI
          - Biotech
          - Defence
          - Tech
          - Crypto
          - Energy

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps (AI)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'AI'
        working-directory: AI
        run: pip install -r requirements.txt

      - name: Run price updater (AI)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'AI'
        working-directory: AI
        run: python AI_update_prices.py

      - name: Install deps (Biotech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Biotech'
        working-directory: Biotech
        run: pip install -r requirements.txt

      - name: Run price updater (Biotech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Biotech'
        working-directory: Biotech
        run: python Biotech_update_prices.py

      - name: Install deps (Defence)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Defence'
        working-directory: Defence
        run: pip install -r requirements.txt

      - name: Run price updater (Defence)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Defence'
        working-directory: Defence
        run: python Defence_update_prices.py

      - name: Install deps (Tech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Tech'
        working-directory: Tech
        run: pip install -r requirements.txt

      - name: Run price updater (Tech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Tech'
        working-directory: Tech
        run: python Tech_update_prices.py

      - name: Install deps (Crypto)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Crypto'
        working-directory: Crypto
        run: pip install -r requirements.txt

      - name: Run price updater (Crypto)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Crypto'
        working-directory: Crypto
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: python Crypto_update_prices.py

      - name: Install deps (Energy)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Energy'
        working-directory: Energy
        run: pip install -r requirements.txt

      - name: Run price updater (Energy)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Energy'
        working-directory: Energy
        run: python Energy_update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SECTOR="${{ inputs.sector }}"
          LABEL="${SECTOR:-all sectors}"
          if git diff --quiet -- AI/index.html AI/prices.json AI/prices-data.js Biotech/index.html Biotech/prices.json Biotech/prices-data.js Defence/index.html Defence/prices.json Defence/prices-data.js Tech/prices.json Tech/prices-data.js Crypto/prices.json Crypto/prices-data.js Energy/prices.json Energy/prices-data.js; then
            echo "No price changes."
          else
            git add AI/index.html AI/prices.json AI/prices-data.js
            git add Biotech/index.html Biotech/prices.json Biotech/prices-data.js
            git add Defence/index.html Defence/prices.json Defence/prices-data.js
            git add Tech/prices.json Tech/prices-data.js
            git add Crypto/prices.json Crypto/prices-data.js
            git add Energy/prices.json Energy/prices-data.js
            git commit -m "Update prices — ${LABEL} ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            for i in 1 2 3; do
              git fetch origin main
              git rebase origin/main
              git push origin HEAD:main && break
              echo "Push attempt $i failed, retrying..."
              sleep 10
            done
          fi
