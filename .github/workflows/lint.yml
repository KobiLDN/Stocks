name: Lint

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python syntax check
        run: |
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./exports/*" \
            | sort | xargs python -m py_compile && echo "All Python files OK"

      - name: JSON validity check
        run: |
          find . -name "*.json" \
            -not -path "./.git/*" \
            -not -path "./exports/*" \
            -not -name "*prices-data*" \
            | sort | while read f; do
              python -c "import json,sys; json.load(open('$f'))" || { echo "INVALID: $f"; exit 1; }
            done
          echo "All JSON files OK"
