name: Generate Export

on:
  schedule:
    # 22:00 UTC weekdays — 30 min after the evening price update (21:30 UTC)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Generate export
        run: python generate_export.py

      - name: Prune old exports (keep last 30)
        run: |
          cd exports
          ls -t *.json 2>/dev/null | grep -v manifest | tail -n +31 | while read f; do
            rm -f "$f" "${f%.json}.csv"
            echo "Pruned $f"
          done

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/
          if git diff --staged --quiet; then
            echo "No changes to export files."
          else
            git commit -m "Update export — $(date -u '+%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git fetch origin main
              git rebase origin/main
              git push origin HEAD:main && break
              echo "Push attempt $i failed, retrying..."
              sleep 10
            done
          fi
