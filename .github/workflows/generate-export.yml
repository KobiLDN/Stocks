name: Generate Export

on:
  schedule:
    # 22:00 UTC weekdays — 30 min after the evening price update (21:30 UTC)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate export
        run: python generate_export.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- all_stocks.csv all_stocks.json; then
            echo "No changes to export files."
          else
            git add all_stocks.csv all_stocks.json
            git commit -m "Update export — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase
            git push
          fi
