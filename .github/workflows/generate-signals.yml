name: Generate Signals

on:
  schedule:
    # Mon/Wed/Fri at 07:00 UTC (08:00 BST / 03:00 ET)
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-signals
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps (AI)
        working-directory: AI
        run: pip install -r requirements.txt

      - name: Generate signals (AI)
        working-directory: AI
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python AI_generate_signals_local.py

      - name: Install deps (Biotech)
        working-directory: Biotech
        run: pip install -r requirements.txt

      - name: Generate signals (Biotech)
        working-directory: Biotech
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Biotech_generate_signals_local.py

      - name: Install deps (Defence)
        working-directory: Defence
        run: pip install -r requirements.txt

      - name: Generate signals (Defence)
        working-directory: Defence
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Defence_generate_signals_local.py

      - name: Install deps (Tech)
        working-directory: Tech
        run: pip install -r requirements.txt

      - name: Generate signals (Tech)
        working-directory: Tech
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Tech_generate_signals_local.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- AI/signals-local.json AI/signals-local.js Biotech/signals-local.json Biotech/signals-local.js Defence/signals-local.json Defence/signals-local.js Tech/signals-local.json Tech/signals-local.js; then
            echo "No signal changes."
          else
            git add AI/signals-local.json AI/signals-local.js
            git add Biotech/signals-local.json Biotech/signals-local.js
            git add Defence/signals-local.json Defence/signals-local.js
            git add Tech/signals-local.json Tech/signals-local.js
            git commit -m "Update signals — all sectors ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase
            git push
          fi
