name: Generate Signals

on:
  schedule:
    # Mon/Wed/Fri at 07:00 UTC (08:00 BST / 03:00 ET)
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch:
    inputs:
      sector:
        description: 'Sector to generate signals for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - AI
          - Biotech
          - Defence
          - Tech
          - Crypto
          - Energy
          - MegaCap

permissions:
  contents: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps (AI)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'AI'
        working-directory: AI
        run: pip install -r requirements.txt

      - name: Generate signals (AI)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'AI'
        working-directory: AI
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python AI_generate_signals_local.py

      - name: Install deps (Biotech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Biotech'
        working-directory: Biotech
        run: pip install -r requirements.txt

      - name: Generate signals (Biotech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Biotech'
        working-directory: Biotech
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Biotech_generate_signals_local.py

      - name: Install deps (Defence)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Defence'
        working-directory: Defence
        run: pip install -r requirements.txt

      - name: Generate signals (Defence)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Defence'
        working-directory: Defence
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Defence_generate_signals_local.py

      - name: Install deps (Tech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Tech'
        working-directory: Tech
        run: pip install -r requirements.txt

      - name: Generate signals (Tech)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Tech'
        working-directory: Tech
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Tech_generate_signals_local.py

      - name: Install deps (Crypto)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Crypto'
        working-directory: Crypto
        run: pip install -r requirements.txt

      - name: Generate signals (Crypto)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Crypto'
        working-directory: Crypto
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Crypto_generate_signals_local.py

      - name: Install deps (Energy)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Energy'
        working-directory: Energy
        run: pip install -r requirements.txt

      - name: Generate signals (Energy)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'Energy'
        working-directory: Energy
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python Energy_generate_signals_local.py

      - name: Install deps (MegaCap)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'MegaCap'
        working-directory: MegaCap
        run: pip install -r requirements.txt

      - name: Generate signals (MegaCap)
        if: github.event_name == 'schedule' || inputs.sector == 'all' || inputs.sector == 'MegaCap'
        working-directory: MegaCap
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python MegaCap_generate_signals_local.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SECTOR="${{ inputs.sector }}"
          LABEL="${SECTOR:-all sectors}"
          if git diff --quiet -- AI/signals-local.json AI/signals-local.js Biotech/signals-local.json Biotech/signals-local.js Defence/signals-local.json Defence/signals-local.js Tech/signals-local.json Tech/signals-local.js Crypto/signals-local.json Crypto/signals-local.js Energy/signals-local.json Energy/signals-local.js MegaCap/signals-local.json MegaCap/signals-local.js; then
            echo "No signal changes."
          else
            git add AI/signals-local.json AI/signals-local.js
            git add Biotech/signals-local.json Biotech/signals-local.js
            git add Defence/signals-local.json Defence/signals-local.js
            git add Tech/signals-local.json Tech/signals-local.js
            git add Crypto/signals-local.json Crypto/signals-local.js
            git add Energy/signals-local.json Energy/signals-local.js
            git add MegaCap/signals-local.json MegaCap/signals-local.js
            git commit -m "Update signals — ${LABEL} ($(date -u '+%Y-%m-%d %H:%M UTC')) [skip ci]"
            for i in 1 2 3; do
              git fetch origin main
              git rebase origin/main
              git push origin HEAD:main && break
              echo "Push attempt $i failed, retrying..."
              sleep 10
            done
          fi
