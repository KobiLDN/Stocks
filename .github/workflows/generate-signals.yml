name: Generate AI Signals

on:
  schedule:
    # Every Monday at 07:00 UTC (08:00 BST / 03:00 ET)
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-signals
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        working-directory: AI
        run: pip install -r requirements.txt

      - name: Generate signals
        working-directory: AI
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python generate_signals_local.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- AI/signals-local.json AI/signals-local.js; then
            echo "No signal changes."
          else
            git add AI/signals-local.json AI/signals-local.js
            git commit -m "Update AI signals ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
