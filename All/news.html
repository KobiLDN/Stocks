<head>

<meta name="description" content="Latest news and sentiment across 192 stocks — AI, Biotech, Defence, Tech, Crypto, and Energy sectors.">
<title>All Sectors — News</title>
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">

<style>
  /* Sector filter active colours (All-specific) */
  .filter-btn[data-sector="biotech"].active { background: var(--green);  border-color: var(--green);  color: var(--bg); }
  .filter-btn[data-sector="defence"].active { background: var(--rose);   border-color: var(--rose);   color: var(--bg); }
  .filter-btn[data-sector="tech"].active    { background: var(--indigo); border-color: var(--indigo); color: #fff; }
  .filter-btn[data-sector="crypto"].active  { background: var(--gold);   border-color: var(--gold);   color: var(--bg); }
  .filter-btn[data-sector="energy"].active  { background: var(--amber);  border-color: var(--amber);  color: var(--bg); }

  /* Sector badges */
  .news-sector-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; padding: 2px 7px; letter-spacing: 0.5px; }
  .sect-ai      { background: rgba(0,212,255,0.1);   color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
  .sect-biotech { background: rgba(0,230,118,0.1);   color: var(--green);  border: 1px solid rgba(0,230,118,0.25); }
  .sect-defence { background: rgba(251,113,133,0.1); color: var(--rose);   border: 1px solid rgba(251,113,133,0.25); }
  .sect-tech    { background: rgba(167,139,250,0.1); color: var(--indigo); border: 1px solid rgba(167,139,250,0.25); }
  .sect-crypto  { background: rgba(255,215,0,0.1);   color: var(--gold);   border: 1px solid rgba(255,215,0,0.25); }
  .sect-energy  { background: rgba(245,158,11,0.1);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.25); }

  /* ─── 3-Panel Layout ─── */
  body[data-layout="rail"] { flex-direction: row; }
  .right-side { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .nav-panel {
    width: 148px; flex-shrink: 0; border-right: 1px solid var(--border);
    background: var(--bg); display: flex; flex-direction: column;
    padding: 8px 0; overflow-y: auto; scrollbar-width: none;
  }
  .nav-panel::-webkit-scrollbar { display: none; }
  .nav-item { display: flex; flex-direction: column; }
  .nav-panel .nav-link {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; padding: 10px 14px; color: var(--dim);
    border: none; border-left: 2px solid transparent; text-decoration: none;
    display: flex; align-items: center; gap: 8px; transition: all 0.15s;
    cursor: pointer; background: none; width: 100%; text-align: left;
  }
  .nav-panel .nav-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
  .nav-panel .nav-link:hover  { color: var(--accent); background: var(--surface2); }
  .nav-icon  { font-size: 14px; flex-shrink: 0; }
  .nav-label { flex: 1; white-space: nowrap; }
  .hamburger {
    display: none; width: 44px; height: 44px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 18px;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .drawer-overlay {
    display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.4);
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 260px; background: var(--bg); border-right: 1px solid var(--accent);
    display: flex; overflow: hidden;
  }
  .drawer .left-rail { border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .drawer .nav-panel  { flex: 1; overflow-y: auto; }
  .bottom-tabs {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 250;
    background: var(--bg); border-top: 1px solid var(--accent);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-tabs-inner { display: flex; justify-content: space-around; align-items: stretch; }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 8px 4px 6px; background: none; border: none;
    cursor: pointer; border-top: 2px solid transparent; transition: all 0.15s;
    font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--muted);
  }
  .tab-btn.active { color: var(--accent); border-top-color: var(--accent); }
  .tab-btn:hover  { color: var(--accent); }
  .tab-icon { font-size: 16px; line-height: 1; }
  @media (max-width: 900px) {
    .nav-panel { width: 52px; }
    .nav-label { display: none !important; }
    .nav-panel .nav-link { padding: 12px 0; justify-content: center; border-left: none; }
    .nav-icon { font-size: 18px; }
    .header-blocks { display: none; }
  }
  @media (max-width: 600px) {
    body { padding-bottom: 56px; }
    body[data-layout="rail"] .left-rail { display: none; }
    .nav-panel { display: none !important; }
    .hamburger { display: flex; }
    .bottom-tabs { display: block; }
    .header-inner { padding: 10px 14px !important; gap: 12px; }
    .header-left { padding: 8px 14px; }
    h1 { font-size: 20px; }
    .header-label { font-size: 9px; }
    .header-sub { font-size: 9px; }
    .container { padding: 12px 14px; }
  }
</style>

<div class="right-side">
<header>
  <div class="header-inner">
  <button class="hamburger" id="hamburger" onclick="openDrawer()">☰</button>
  <div class="header-left">
    <div class="header-label">// Market Intelligence</div>
    <h1>All <span>News</span></h1>
    <div class="header-sub">Latest headlines across <span id="all-stock-count">—</span> stocks · AI-scored sentiment</div>
  </div>
  <div class="header-blocks">
  <div class="header-block">
  <div class="header-block-label">Prices Last Updated</div>
  <div class="header-block-value" id="data-bar-ts">—</div>
  </div>
  </div>
  <button aria-label="Toggle theme" class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☾</button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-sector="all"     onclick="setSector('all',this)">All</button>
    <button class="filter-btn"        data-sector="ai"      onclick="setSector('ai',this)">AI Infra</button>
    <button class="filter-btn"        data-sector="biotech" onclick="setSector('biotech',this)">Biotech</button>
    <button class="filter-btn"        data-sector="defence" onclick="setSector('defence',this)">Defence</button>
    <button class="filter-btn"        data-sector="tech"    onclick="setSector('tech',this)">Tech</button>
    <button class="filter-btn"        data-sector="crypto"  onclick="setSector('crypto',this)">Crypto</button>
    <button class="filter-btn"        data-sector="energy"  onclick="setSector('energy',this)">Energy</button>
  </div>

  <div class="news-toolbar">
    <input type="text" id="news-search" placeholder="Search ticker, company or headline..." oninput="filterNews(this.value)">
    <span class="sort-label">Sort</span>
    <div class="sort-group" id="sort-group">
      <button class="sort-btn active" data-sort="newest"   onclick="setSort('newest',this)">Newest</button>
      <button class="sort-btn"        data-sort="oldest"   onclick="setSort('oldest',this)">Oldest</button>
      <button class="sort-btn"        data-sort="positive" onclick="setSort('positive',this)">Most Positive</button>
      <button class="sort-btn"        data-sort="negative" onclick="setSort('negative',this)">Most Negative</button>
    </div>
    <span class="sort-label">Period</span>
    <div class="sort-group" id="window-group">
      <button class="sort-btn"        data-window="all"  onclick="setWindow('all',this)">All Time</button>
      <button class="sort-btn active" data-window="day"  onclick="setWindow('day',this)">Last 24h</button>
      <button class="sort-btn"        data-window="week" onclick="setWindow('week',this)">Last Week</button>
    </div>
    <span class="row-count">Showing <span id="news-count">—</span> articles</span>
  </div>
</header>

<div class="page-body">
<div class="page-main">
<div class="container">
  <div class="news-feed" id="news-feed">
    <div class="empty-state">Loading all sectors…</div>
  </div>
</div>

<script>
  let allNews      = [];
  let filteredNews = [];
  let activeSector = 'all';
  let activeSort   = 'newest';
  let activeWindow = 'day';
  let activeQuery  = '';

  const SECTOR_LABELS = {
    'ai':'AI Infra','biotech':'Biotech','defence':'Defence',
    'tech':'Tech','crypto':'Crypto','energy':'Energy',
  };

  function sentClass(score) {
    if (score === null || score === undefined) return 'sent-neu';
    if (score > 0.05)  return 'sent-pos';
    if (score < -0.05) return 'sent-neg';
    return 'sent-neu';
  }
  function sentLabel(score) {
    if (score === null || score === undefined) return '—';
    return (score > 0 ? '+' : '') + score.toFixed(2);
  }
  function timeAgo(ts) {
    const diff = Date.now() / 1000 - ts;
    if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function yahooUrl(ticker) {
    return 'https://finance.yahoo.com/quote/' + encodeURIComponent(ticker);
  }

  function setSector(sector, btn) {
    activeSector = sector;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }
  function setSort(mode, btn) {
    activeSort = mode;
    document.querySelectorAll('#sort-group .sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }
  function setWindow(w, btn) {
    activeWindow = w;
    document.querySelectorAll('#window-group .sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }
  function filterNews(q) {
    activeQuery = q.trim().toLowerCase();
    applyFilters();
  }

  function applyFilters() {
    let items = allNews.slice();

    if (activeSector !== 'all') items = items.filter(n => n.sector === activeSector);

    const now = Date.now() / 1000;
    if (activeWindow === 'day')  items = items.filter(n => now - n.ts < 86400);
    if (activeWindow === 'week') items = items.filter(n => now - n.ts < 604800);

    if (activeQuery) {
      items = items.filter(n =>
        n.ticker.toLowerCase().includes(activeQuery) ||
        (n.company || '').toLowerCase().includes(activeQuery) ||
        n.headline.toLowerCase().includes(activeQuery)
      );
    }

    if (activeSort === 'newest')   items.sort((a, b) => b.ts - a.ts);
    if (activeSort === 'oldest')   items.sort((a, b) => a.ts - b.ts);
    if (activeSort === 'positive') items.sort((a, b) => (b.sent ?? -99) - (a.sent ?? -99));
    if (activeSort === 'negative') items.sort((a, b) => (a.sent ?? 99)  - (b.sent ?? 99));

    filteredNews = items;
    renderFeed();
  }

  function renderFeed() {
    const countEl = document.getElementById('news-count');
    const feed    = document.getElementById('news-feed');
    if (countEl) countEl.textContent = filteredNews.length;

    if (!filteredNews.length) {
      feed.innerHTML = '<div class="empty-state">No articles found for this selection.</div>';
      return;
    }

    feed.innerHTML = filteredNews.map(n => {
      const sc     = sentClass(n.sent);
      const slabel = SECTOR_LABELS[n.sector] || n.sector;
      return '<div class="news-card">' +
        '<div class="sent-bar ' + sc + '"></div>' +
        '<div class="news-body">' +
          '<div class="news-meta-top">' +
            '<a class="news-ticker" href="' + yahooUrl(n.ticker) + '" target="_blank" rel="noopener">' + esc(n.ticker) + '</a>' +
            '<span class="news-sector-badge sect-' + n.sector + '">' + esc(slabel) + '</span>' +
            '<span class="news-time">' + timeAgo(n.ts) + '</span>' +
          '</div>' +
          (n.url
            ? '<a class="news-headline" href="' + esc(n.url) + '" target="_blank" rel="noopener">' + esc(n.headline) + '</a>'
            : '<span class="news-headline">' + esc(n.headline) + '</span>') +
          '<div class="news-meta-bot">' +
            '<span class="sent-pill ' + sc + '">' + sentLabel(n.sent) + '</span>' +
            (n.publisher ? '<span class="news-company">' + esc(n.publisher) + '</span>' : '') +
          '</div>' +
        '</div></div>';
    }).join('');
  }

  const SECTORS = [
    { key: 'ai',      path: '../AI/prices-data.js'      },
    { key: 'biotech', path: '../Biotech/prices-data.js'  },
    { key: 'defence', path: '../Defence/prices-data.js'  },
    { key: 'tech',    path: '../Tech/prices-data.js'     },
    { key: 'crypto',  path: '../Crypto/prices-data.js'   },
    { key: 'energy',  path: '../Energy/prices-data.js'   },
  ];

  Promise.all(SECTORS.map(async sd => {
    try {
      const text  = await fetch(sd.path).then(r => r.text());
      const match = text.match(/window\.PRICES_DATA\s*=\s*(\{[\s\S]*\})\s*;?\s*$/);
      if (!match) return { news: [], stocks: [] };
      const data  = JSON.parse(match[1]);

      // Populate data-bar-ts from first sector that has an updated field
      if (data.updated) {
        const el = document.getElementById('data-bar-ts');
        if (el && el.textContent === '—') el.textContent = data.updated;
      }

      const items = [];
      (data.stocks || []).forEach(s => {
        (s.news || []).forEach(n => {
          items.push({
            ticker:  s.ticker,
            company: s.company_name || '',
            sector:  sd.key,
            headline: n.headline || n.title || '',
            url:     n.url || '',
            ts:      n.published_at || n.published || 0,
            sent:    n.sentiment_score !== undefined ? n.sentiment_score : (n.sentiment !== undefined ? n.sentiment : null),
            publisher: n.publisher || n.source || '',
          });
        });
      });
      return { news: items, stocks: data.stocks || [] };
    } catch(e) { return { news: [], stocks: [] }; }
  })).then(results => {
    allNews = results.flatMap(r => r.news);
    const sc = document.getElementById('all-stock-count');
    if (sc) sc.textContent = new Set(allNews.map(n => n.ticker).filter(Boolean)).size;
    buildTape(results.flatMap(r => r.stocks));
    applyFilters();
  });

  function openDrawer()  { document.getElementById('drawer-overlay').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }
</script>
